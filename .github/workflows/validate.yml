name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  action-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install test dependencies
        run: python3 -m pip install --user --disable-pip-version-check PyYAML
      - name: Validate action metadata YAML
        run: python3 -c 'import yaml; yaml.safe_load(open("action.yml", encoding="utf-8"))'
      - name: Test action metadata contract
        run: python3 test/action_metadata_test.py
